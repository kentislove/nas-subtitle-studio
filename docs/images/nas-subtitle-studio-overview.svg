  <text x="1094" y="188" fill="#65747e" font-family="Segoe UI, Noto Sans TC, Arial" font-size="15">狀態：可編輯</text>
  <text x="1094" y="218" fill="#65747e" font-family="Segoe UI, Noto Sans TC, Arial" font-size="15">長度：01:21.384</text>
  <rect x="1094" y="250" width="294" height="38" rx="6" fill="#fff" stroke="#d9e2e7"/>
  <text x="1208" y="275" text-anchor="middle" fill="#1f2933" font-family="Segoe UI, Noto Sans TC, Arial" font-size="16" font-weight="700">產生字幕</text>
  <rect x="1094" y="298" width="294" height="38" rx="6" fill="#fff" stroke="#d9e2e7"/>
  <text x="1208" y="323" text-anchor="middle" fill="#1f2933" font-family="Segoe UI, Noto Sans TC, Arial" font-size="16" font-weight="700">匯入字幕</text>
  <rect x="1094" y="346" width="294" height="126" rx="8" fill="#fff8df" stroke="#e4c66a"/>
  <text x="1114" y="374" fill="#7a4f00" font-family="Segoe UI, Noto Sans TC, Arial" font-size="16" font-weight="700">注意</text>
  <text x="1114" y="404" fill="#60420a" font-family="Segoe UI, Noto Sans TC, Arial" font-size="14">建議先將影片上傳到 Gemini</text>
  <text x="1114" y="426" fill="#60420a" font-family="Segoe UI, Noto Sans TC, Arial" font-size="14">產生 SRT 後，再回到這裡匯入</text>
  <text x="1114" y="448" fill="#60420a" font-family="Segoe UI, Noto Sans TC, Arial" font-size="14">整合、預覽、拖曳修正。</text>
  <rect x="1094" y="486" width="140" height="38" rx="6" fill="#fff" stroke="#d9e2e7"/>
  <text x="1164" y="511" text-anchor="middle" fill="#1f2933" font-family="Segoe UI, Noto Sans TC, Arial" font-size="16" font-weight="700">儲存字幕</text>
  <rect x="1248" y="486" width="140" height="38" rx="6" fill="#fff" stroke="#d9e2e7"/>
  <text x="1318" y="511" text-anchor="middle" fill="#1f2933" font-family="Segoe UI, Noto Sans TC, Arial" font-size="16" font-weight="700">匯出 MP4</text>

  <rect x="368" y="628" width="1044" height="252" rx="8" fill="#fff" stroke="#d9e2e7"/>
  <text x="392" y="666" fill="#1f2933" font-family="Segoe UI, Noto Sans TC, Arial" font-size="22" font-weight="700">字幕時間軸</text>
  <rect x="1078" y="642" width="34" height="30" rx="6" fill="#fff" stroke="#d9e2e7"/>
  <text x="1095" y="663" text-anchor="middle" fill="#1f2933" font-family="Segoe UI, Noto Sans TC, Arial" font-size="16">-</text>
  <rect x="1118" y="642" width="44" height="30" rx="6" fill="#fff" stroke="#d9e2e7"/>
  <text x="1140" y="663" text-anchor="middle" fill="#1f2933" font-family="Segoe UI, Noto Sans TC, Arial" font-size="14">Fit</text>
  <rect x="1168" y="642" width="34" height="30" rx="6" fill="#fff" stroke="#d9e2e7"/>
  <text x="1185" y="663" text-anchor="middle" fill="#1f2933" font-family="Segoe UI, Noto Sans TC, Arial" font-size="16">+</text>
