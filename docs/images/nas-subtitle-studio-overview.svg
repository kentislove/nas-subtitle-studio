<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="920" viewBox="0 0 1440 920" role="img" aria-labelledby="title desc">
  <title id="title">NAS Subtitle Studio desktop overview</title>
  <desc id="desc">The main NAS Subtitle Studio workspace with the video preview, subtitle controls, library, and editing panels.</desc>
  <rect width="1440" height="920" fill="#f5f7f8"/>
  <rect width="340" height="920" fill="#22313a"/>
  <text x="28" y="52" fill="#f7fbfc" font-family="Segoe UI, Noto Sans TC, Arial" font-size="28" font-weight="700">NAS Subtitle Studio</text>
  <text x="28" y="82" fill="#b9c7ce" font-family="Segoe UI, Noto Sans TC, Arial" font-size="17">錄影、上傳、字幕、章節、匯出</text>
  <rect x="224" y="28" width="88" height="30" rx="15" fill="#2f6c5f" stroke="#5e8b84"/>
  <text x="241" y="49" fill="#f7fbfc" font-family="Segoe UI, Noto Sans TC, Arial" font-size="14">Gemini 已設定</text>

  <line x1="28" y1="118" x2="312" y2="118" stroke="#40515a"/>
  <text x="28" y="154" fill="#f7fbfc" font-family="Segoe UI, Noto Sans TC, Arial" font-size="20" font-weight="700">錄影</text>
  <rect x="28" y="174" width="116" height="40" rx="6" fill="#1e7f74"/>
  <text x="52" y="200" fill="#fff" font-family="Segoe UI, Noto Sans TC, Arial" font-size="16" font-weight="700">開始錄影</text>
  <text x="164" y="200" fill="#dbe7eb" font-family="Consolas, monospace" font-size="18">00:00.000</text>

  <line x1="28" y1="244" x2="312" y2="244" stroke="#40515a"/>
  <text x="28" y="280" fill="#f7fbfc" font-family="Segoe UI, Noto Sans TC, Arial" font-size="20" font-weight="700">上傳</text>
  <rect x="28" y="302" width="284" height="40" rx="6" fill="#34464f" stroke="#52646d"/>
  <text x="46" y="328" fill="#dbe7eb" font-family="Segoe UI, Noto Sans TC, Arial" font-size="15">選擇 MP4 / WebM / MOV 影片</text>

  <line x1="28" y1="372" x2="312" y2="372" stroke="#40515a"/>
  <text x="28" y="408" fill="#f7fbfc" font-family="Segoe UI, Noto Sans TC, Arial" font-size="20" font-weight="700">影片庫</text>
  <rect x="252" y="386" width="60" height="34" rx="6" fill="#fff"/>
  <text x="267" y="408" fill="#1f2933" font-family="Segoe UI, Noto Sans TC, Arial" font-size="15" font-weight="700">更新</text>
  <rect x="28" y="438" width="284" height="72" rx="7" fill="#2f6f62" stroke="#96b5af"/>
  <text x="46" y="468" fill="#fff" font-family="Segoe UI, Noto Sans TC, Arial" font-size="16" font-weight="700">recording-2026-07-20...</text>
  <rect x="46" y="480" width="58" height="22" rx="11" fill="#4c998c"/>
  <text x="58" y="496" fill="#dbe7eb" font-family="Segoe UI, Noto Sans TC, Arial" font-size="12">可編輯</text>
  <rect x="28" y="522" width="284" height="72" rx="7" fill="#2b3c45" stroke="#52646d"/>
  <text x="46" y="552" fill="#fff" font-family="Segoe UI, Noto Sans TC, Arial" font-size="16" font-weight="700">uploaded-demo.mp4</text>
  <rect x="46" y="564" width="58" height="22" rx="11" fill="#3d5660"/>
  <text x="58" y="580" fill="#dbe7eb" font-family="Segoe UI, Noto Sans TC, Arial" font-size="12">已匯出</text>

  <rect x="368" y="24" width="1044" height="68" rx="8" fill="#fff" stroke="#d9e2e7"/>
  <text x="392" y="66" fill="#1f2933" font-family="Segoe UI, Noto Sans TC, Arial" font-size="24" font-weight="700">本機 NAS 影片字幕工作台：錄影、字幕、修正、匯出都在同一個畫面完成</text>

  <rect x="368" y="116" width="680" height="430" rx="8" fill="#111820"/>
  <rect x="395" y="146" width="626" height="352" rx="4" fill="#263139"/>
  <rect x="410" y="420" width="596" height="48" rx="4" fill="#111820" opacity="0.88"/>
